<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D24 Strategy Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <h1>Stint Timer Tool</h1>
    <!-- Status indicator -->
    <div id="status">Ready</div>

    <!-- Driver and configuration setup -->
    <div id="drivers-setup">
        <label>
            Drivers (comma separated):
            <input id="drivers-input" type="text" placeholder="e.g. Rich, Tom L, Tom, Alex, Dunc, Jamie, Matt"/>
        </label>
        <label>
            Single stint length (minutes):
            <input id="single-duration-input" type="number" min="1" step="1" value="45"/>
        </label>
        <label>
            Double stint length (minutes):
            <input id="double-duration-input" type="number" min="1" step="1" value="90"/>
        </label>
        <label>
            Pit window opens (minutes before end):
            <input id="pit-offset-input" type="number" min="0" step="1" value="5"/>
        </label>
        <button id="load-drivers-btn">Load Drivers</button>
    </div>

    <!-- Stint setup section, hidden until drivers loaded -->
    <div id="stint-setup" style="display:none;">
        <h2>Driver Rotation</h2>
        <p>Current Driver: <span id="current-driver">N/A</span></p>
        <p>Next Driver: <span id="next-driver">N/A</span></p>
        <p>Reserve Driver: <span id="reserve-driver">N/A</span></p>
        <label>
            Stint type:
            <input type="radio" name="stint-type" value="single" checked> Single
            <input type="radio" name="stint-type" value="double"> Double
        </label>
        <button id="start-btn">Start Stint</button>
        <button id="end-btn" disabled>End Stint</button>
    </div>

    <!-- Timer display section -->
    <div id="timer-display" style="display:none;">
        <h2>Stint Timing</h2>
        <p>Time In: <span id="time-in">00:00:00</span></p>
        <p>Time Left: <span id="time-left">00:00:00</span></p>
        <p>Pit Window Opens In: <span id="pit-window">--:--:--</span></p>
    </div>

    <!-- Include the new stint timer script with a version query string -->
    <script src="/static/stint_timer.js?v=1"></script>
</body>
</html>
