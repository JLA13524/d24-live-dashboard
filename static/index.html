<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D24 Strategy Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <h1>D24 Strategy Dashboard</h1>
    <!-- Status indicator -->
    <div id="status">Dashboard ready</div>

    <!-- Manual input section for race metrics -->
    <div class="manual-inputs">
        <label>
            Current Lap:
            <input id="lap-input" type="number" min="0" step="1" />
        </label>
        <label>
            Position:
            <input id="position-input" type="number" min="1" step="1" />
        </label>
        <label>
            Gap to P1:
            <input id="gap-input" type="text" placeholder="e.g. +1 lap or +30s" />
        </label>
        <label>
            Stint #:
            <input id="stint-input" type="number" min="1" step="1" />
        </label>
        <label>
            Driver:
            <input id="driver-input" type="text" placeholder="Driver name" />
        </label>
        <label>
            Last Lap Time:
            <input id="lastlap-input" type="text" placeholder="e.g. 75.34s" />
        </label>
        <button id="update-btn">Update</button>
    </div>

    <!-- Display section for current metrics -->
    <div class="display">
        <h2>Current Metrics</h2>
        <p id="display-lap">Lap: N/A</p>
        <p id="display-position">Position: N/A</p>
        <p id="display-gap">Gap to P1: N/A</p>
        <p id="display-stint">Stint #: N/A</p>
        <p id="display-driver">Driver: N/A</p>
        <p id="display-lastlap">Last Lap: N/A</p>
    </div>

    <!--
      Use the versioned script ``app_new.js`` to ensure that browsers do not
      cache an old copy of the front‑end logic. If you make further changes,
      increment the filename or append a query string to bust caches.
    -->
    <!-- Append a version query string to the script to bust browser caches -->
    <script src="/static/app_new.js?v=manual"></script>
</body>
</html>
